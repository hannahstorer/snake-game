name: build snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: fetch contribution data
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_contributions.py

      - name: build snake path
        run: python scripts/generate_path.py

      - name: render svg
        run: |
          mkdir -p dist
          python scripts/render_svg.py

      - name: publish to output branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin
          git checkout output 2>/dev/null || git checkout --orphan output
          git rm -rf . --quiet 2>/dev/null || true
          cp dist/snake_darkmode.svg snake_darkmode.svg
          cp dist/snake_lightmode.svg snake_lightmode.svg
          git add snake_darkmode.svg snake_lightmode.svg
          git commit -m "update snake"
          git push origin output --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}